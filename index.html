<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIStudioX | Global Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --p-blue: #00f2fe; --p-pink: #ff007f; --p-purple: #7000ff;
            --bg: #010409; --card: rgba(13, 17, 23, 0.95);
            --text: #ffffff; --border: rgba(255, 255, 255, 0.1);
            --gradient: linear-gradient(135deg, var(--p-blue), var(--p-pink), var(--p-purple));
        }

        [data-theme="light"] {
            --bg: #f0f2f5; --card: #ffffff; --text: #1a1a1a;
            --border: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; transition: background 0.3s, color 0.3s; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; scroll-behavior: smooth; min-height: 100vh; }

        /* SPLASH FULL SCREEN */
        #splash { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.8s; }
        #splash.hidden { opacity: 0; visibility: hidden; transform: scale(1.1); pointer-events: none; }

        /* LOGO DIStudioX */
        .logo-box { display: flex; align-items: center; gap: 4px; cursor: pointer; user-select: none; }
        .logo-symbol { background: var(--gradient); padding: 4px 10px; border-radius: 8px; font-weight: 900; color: #000; font-size: 1.1rem; }
        .logo-text { font-weight: 900; font-size: 1.3rem; color: var(--text); letter-spacing: -0.5px; }
        .logo-text span { color: var(--p-pink); }

        /* NAV */
        nav { position: fixed; top: 0; width: 100%; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(20px); background: rgba(var(--bg), 0.8); border-bottom: 1px solid var(--border); z-index: 1000; }
        .nav-tools { display: flex; gap: 15px; align-items: center; }
        .settings-btn { cursor: pointer; font-size: 1.2rem; color: var(--p-blue); }

        /* PANEL AJUSTES */
        #settings-panel { position: fixed; top: 80px; right: 5%; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--border); display: none; z-index: 2000; box-shadow: 0 10px 40px rgba(0,0,0,0.5); width: 300px; }
        #settings-panel.active { display: block; animation: fadeIn 0.3s; }

        main { padding: 110px 5% 40px; max-width: 800px; margin: 0 auto; text-align: center; }
        .hero-title { font-size: 3.5rem; font-weight: 900; margin-bottom: 40px; }
        .hero-title span { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* FORM */
        .card { background: var(--card); border-radius: 30px; padding: 35px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.2); margin-bottom: 30px; text-align: left; }
        label { color: var(--p-blue); font-size: 0.75rem; font-weight: 900; display: block; margin: 20px 0 8px; text-transform: uppercase; letter-spacing: 1px; }
        input, select, textarea { width: 100%; padding: 16px; background: rgba(128,128,128,0.08); border: 1px solid var(--border); border-radius: 14px; color: var(--text); outline: none; font-size: 1rem; }
        
        .btn-main { width: 100%; padding: 20px; background: var(--gradient); border: none; border-radius: 15px; font-weight: 900; color: #000; cursor: pointer; text-transform: uppercase; margin-top: 25px; font-size: 1rem; }
        
        footer { padding: 40px 0; text-align: center; border-top: 1px solid var(--border); }
        .footer-socials { display: flex; justify-content: center; gap: 25px; margin-bottom: 15px; }
        .footer-socials a { font-size: 1.8rem; color: var(--text); opacity: 0.7; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-box" style="transform: scale(1.6);">
            <div class="logo-symbol">DI</div><div class="logo-text">Studio<span>X</span></div>
        </div>
    </div>

    <nav>
        <div class="logo-box" onclick="location.reload()">
            <div class="logo-symbol">DI</div><div class="logo-text">Studio<span>X</span></div>
        </div>
        <div class="nav-tools">
            <i class="fas fa-cog settings-btn" onclick="toggleSettings()"></i>
        </div>
    </nav>

    <div id="settings-panel">
        <h3 id="t-settings-title" style="margin-bottom: 15px;">Ajustes Globales</h3>
        <label id="t-label-lang">Idioma del Sistema</label>
        <select id="language-select" onchange="changeLanguage(this.value)"></select>

        <label id="t-label-theme">Apariencia</label>
        <button onclick="toggleTheme()" class="btn-main" style="padding: 12px; font-size: 0.8rem; background: var(--border); color: var(--text);">
            <i class="fas fa-adjust"></i> <span id="t-theme-btn">Cambiar Modo</span>
        </button>
    </div>

    <main>
        <h1 class="hero-title"><span>DIStudioX</span></h1>
        
        <div class="card">
            <form id="proForm" action="https://formspree.io/f/mkoqopjp" method="POST" enctype="multipart/form-data">
                <label id="t-label-name">Nombre</label>
                <input type="text" name="nombre" required>
                
                <label id="t-label-service">Servicio Pro</label>
                <select name="servicio" id="service-select">
                    <option value="logo" data-key="opt-logo">Diseño Logo Premium</option>
                    <option value="web" data-key="opt-web">Desarrollo Web Master</option>
                    <option value="trans" data-key="opt-trans">Traducción Profesional</option>
                    <option value="video" data-key="opt-video">Edición de Video</option>
                </select>

                <label id="t-label-details">Detalles</label>
                <textarea name="mensaje" rows="4" required></textarea>

                <label id="t-label-file">Adjuntar Material</label>
                <input type="file" name="archivo" multiple>

                <button type="submit" class="btn-main" id="t-btn-send">Enviar Ahora</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-socials">
            <a href="https://x.com/DIStudioOficial" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="https://www.instagram.com/distudiooficialx" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.facebook.com/profile.php?id=61583573461352" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.youtube.com/@DIStudioOficialX" target="_blank"><i class="fab fa-youtube"></i></a>
        </div>
        <p style="font-size: 0.7rem; opacity: 0.5;">© 2026 DIStudioX INFINITY</p>
    </footer>

    <script>
        // DICCIONARIO DE TRADUCCIÓN
        const translations = {
            "Español": {
                "settings-title": "Ajustes Globales",
                "label-lang": "Idioma del Sistema",
                "label-theme": "Apariencia",
                "theme-btn": "Cambiar Modo",
                "label-name": "Nombre",
                "label-service": "Servicio Pro",
                "label-details": "Detalles",
                "label-file": "Adjuntar Material",
                "btn-send": "Enviar Ahora",
                "opt-logo": "Diseño Logo Premium",
                "opt-web": "Desarrollo Web Master",
                "opt-trans": "Traducción Profesional",
                "opt-video": "Edición de Video"
            },
            "Inglés": {
                "settings-title": "Global Settings",
                "label-lang": "System Language",
                "label-theme": "Appearance",
                "theme-btn": "Switch Mode",
                "label-name": "Name",
                "label-service": "Pro Service",
                "label-details": "Details",
                "label-file": "Attach Material",
                "btn-send": "Send Now",
                "opt-logo": "Premium Logo Design",
                "opt-web": "Master Web Development",
                "opt-trans": "Professional Translation",
                "opt-video": "Video Editing"
            },
            "Francés": {
                "settings-title": "Paramètres Globaux",
                "label-lang": "Langue du Système",
                "label-theme": "Apparence",
                "theme-btn": "Changer le Mode",
                "label-name": "Nom",
                "label-service": "Service Pro",
                "label-details": "Détails",
                "label-file": "Joindre du Matériel",
                "btn-send": "Envoyer Maintenant",
                "opt-logo": "Design de Logo Premium",
                "opt-web": "Développement Web Master",
                "opt-trans": "Traduction Professionnelle",
                "opt-video": "Montage Vidéo"
            }
        };

        const languages = ["Afrikáans", "Albanés", "Alemán", "Árabe", "Catalán", "Chino", "Coreano", "Danés", "Español", "Esperanto", "Estonio", "Euskera", "Finlandés", "Francés", "Gallego", "Griego", "Hindi", "Holandés", "Húngaro", "Indonesio", "Inglés", "Italiano", "Japonés", "Noruego", "Polaco", "Portugués", "Ruso", "Sueco", "Tailandés", "Turco", "Vietnamita"];

        window.onload = () => {
            const select = document.getElementById('language-select');
            languages.sort().forEach(lang => {
                const opt = document.createElement('option');
                opt.value = lang; opt.innerText = lang;
                if(lang === "Español") opt.selected = true;
                select.appendChild(opt);
            });
            setTimeout(() => document.getElementById('splash').classList.add('hidden'), 1000);
        };

        function toggleSettings() { document.getElementById('settings-panel').classList.toggle('active'); }

        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        }

        function changeLanguage(lang) {
            const dict = translations[lang] || translations["Inglés"]; // Por defecto inglés si no está en el dict
            
            document.getElementById('t-settings-title').innerText = dict["settings-title"];
            document.getElementById('t-label-lang').innerText = dict["label-lang"];
            document.getElementById('t-label-theme').innerText = dict["label-theme"];
            document.getElementById('t-theme-btn').innerText = dict["theme-btn"];
            document.getElementById('t-label-name').innerText = dict["label-name"];
            document.getElementById('t-label-service').innerText = dict["label-service"];
            document.getElementById('t-label-details').innerText = dict["label-details"];
            document.getElementById('t-label-file').innerText = dict["label-file"];
            document.getElementById('t-btn-send').innerText = dict["btn-send"];

            // Traducir opciones del select
            const options = document.querySelectorAll('#service-select option');
            options.forEach(opt => {
                const key = opt.getAttribute('data-key');
                opt.innerText = dict[key];
            });
        }
    </script>
</body>
</html>
