<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DI StudioX | Infinity Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --p-blue: #00f2fe; --p-pink: #ff007f; --p-purple: #7000ff;
            --bg: #010409; --card: rgba(13, 17, 23, 0.9);
            --border: rgba(255, 255, 255, 0.08);
            --gradient: linear-gradient(135deg, var(--p-blue), var(--p-pink), var(--p-purple));
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; scroll-behavior: smooth; }

        /* NAVEGACIÓN */
        nav { position: fixed; top: 0; width: 100%; padding: 15px 6%; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(25px); background: rgba(1, 4, 9, 0.8); border-bottom: 1px solid var(--border); z-index: 1000; }
        .logo-nav { height: 42px; cursor: pointer; transition: 0.3s; }

        /* BOTÓN VOLVER (FLOTANTE) */
        #back-btn { 
            position: fixed; bottom: 30px; left: 30px; 
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            width: 50px; height: 50px; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center;
            color: #fff; cursor: pointer; z-index: 2000; 
            backdrop-filter: blur(10px); transition: 0.4s;
            opacity: 0; pointer-events: none;
        }
        #back-btn.visible { opacity: 1; pointer-events: auto; }
        #back-btn:hover { background: var(--p-pink); border-color: var(--p-pink); transform: scale(1.1); }

        main { padding: 120px 6% 60px; max-width: 1200px; margin: 0 auto; }
        .text-gradient { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* FORO */
        .forum-container { margin-top: 80px; background: var(--card); border-radius: 35px; padding: 35px; border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .forum-input { background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 25px; }
        .forum-input textarea { width: 100%; background: transparent; border: none; color: #fff; font-size: 1rem; outline: none; resize: none; }
        
        .forum-post { 
            background: rgba(255,255,255,0.02); padding: 25px; border-radius: 25px; 
            margin-bottom: 15px; border: 1px solid var(--border);
            transition: 0.3s; animation: slideIn 0.4s ease-out;
        }
        .post-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .like-btn { 
            cursor: pointer; display: flex; align-items: center; gap: 8px; 
            color: #666; transition: 0.3s; font-weight: 800; font-size: 0.9rem;
        }
        .like-btn.active { color: var(--p-pink); text-shadow: 0 0 10px var(--p-pink); }
        .like-btn i { font-size: 1.2rem; }

        /* SUCCESS SCREEN */
        #success-screen { display: none; text-align: center; padding: 100px 5%; }
        .giant-socials { display: flex; justify-content: center; gap: 25px; margin: 40px 0; flex-wrap: wrap; }
        .giant-socials a { font-size: 5.5rem; color: #fff; transition: 0.5s; animation: palpitar 1.5s infinite; }
        
        @keyframes palpitar { 
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0px var(--p-blue)); }
            50% { transform: scale(1.15); filter: drop-shadow(0 0 40px var(--p-blue)); }
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .btn-main { width: 100%; padding: 20px; background: var(--gradient); border: none; border-radius: 18px; font-weight: 900; color: #000; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,242,254,0.3); }

        .card { background: var(--card); border-radius: 30px; padding: 30px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="back-btn" onclick="goBack()" title="Volver arriba">
        <i class="fas fa-arrow-up"></i>
    </div>

    <nav>
        <img src="https://i.ibb.co/L9H8b4y/logo-principal.png" class="logo-nav" onclick="location.reload()">
        <div style="font-size: 0.6rem; letter-spacing: 2px; font-weight: 900; color: var(--p-blue); border: 1px solid; padding: 5px 10px; border-radius: 8px;">CORE INFINITY</div>
    </nav>

    <main id="main-content">
        <div id="app-content">
            <h1 style="text-align:center; font-size: clamp(2rem, 8vw, 3.5rem); margin-bottom: 40px;">DI <span class="text-gradient">StudioX</span></h1>
            
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px;">
                <div class="card">
                    <form id="proForm" action="https://formspree.io/f/mkoqopjp" method="POST">
                        <label style="color: var(--p-pink); font-size: 0.7rem; font-weight: 800; letter-spacing: 2px;">IDENTIFICACIÓN</label>
                        <input type="text" name="nombre" placeholder="Nombre completo" style="width:100%; padding:15px; margin: 10px 0 20px; background:rgba(0,0,0,0.5); border:1px solid var(--border); border-radius:12px; color:#fff;" required>
                        <label style="color: var(--p-pink); font-size: 0.7rem; font-weight: 800; letter-spacing: 2px;">EMAIL</label>
                        <input type="email" name="email" placeholder="ejemplo@gmail.com" style="width:100%; padding:15px; margin: 10px 0 20px; background:rgba(0,0,0,0.5); border:1px solid var(--border); border-radius:12px; color:#fff;" required>
                        <button type="submit" class="btn-main">LANZAR PROYECTO</button>
                    </form>
                </div>

                <div class="card" style="display:flex; flex-direction:column; justify-content:center; align-items:center; background: var(--gradient); color:#000;">
                    <p style="font-weight: 900; font-size: 0.8rem;">INVERSIÓN ESTIMADA</p>
                    <h2 style="font-size: 4rem; font-weight: 900;">50€</h2>
                    <p style="font-size: 0.6rem; font-weight: 800; opacity: 0.7;">PAGO SEGURO ENCRIPTADO</p>
                </div>
            </div>

            <section class="forum-container" id="foro">
                <h2 style="margin-bottom: 25px;">Foro <span class="text-gradient">Comunidad Elite</span></h2>
                <div class="forum-input">
                    <textarea id="forum-text" rows="3" placeholder="Comparte tu opinión o experiencia con nosotros..."></textarea>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
                        <span id="ai-status" style="font-size: 0.7rem; font-weight: 900; letter-spacing: 1px;">IA: STANDBY</span>
                        <button class="btn-main" style="width: auto; padding: 10px 25px; font-size: 0.8rem;" onclick="publishPost()">PUBLICAR</button>
                    </div>
                </div>
                <div id="forum-feed"></div>
            </section>
        </div>

        <div id="success-screen">
            <h1 class="text-gradient" style="font-size: 3.5rem;">¡RECIBIDO!</h1>
            <p style="margin-top: 10px; opacity: 0.7; letter-spacing: 1px;">SÍGUENOS PARA VER EL PROGRESO</p>
            <div class="giant-socials">
                <a href="https://x.com/DIStudioOficial" target="_blank"><i class="fab fa-x-twitter"></i></a>
                <a href="https://www.instagram.com/distudiooficialx" target="_blank" style="color:var(--p-pink)"><i class="fab fa-instagram"></i></a>
                <a href="https://www.facebook.com/profile.php?id=61583573461352" target="_blank" style="color:#1877F2"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.youtube.com/@DIStudioOficialX" target="_blank" style="color:#FF0000"><i class="fab fa-youtube"></i></a>
            </div>
            <button class="btn-main" style="max-width: 250px;" onclick="location.reload()">FINALIZAR</button>
        </div>
    </main>

    <script>
        // Control de Scroll y Botón Volver
        window.onscroll = () => {
            const btn = document.getElementById('back-btn');
            if (window.scrollY > 400) btn.classList.add('visible');
            else btn.classList.remove('visible');
        };

        function goBack() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Formulario
        const form = document.getElementById('proForm');
        form.onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch(form.action, { method: 'POST', body: new FormData(form), headers: { 'Accept': 'application/json' } });
            if(res.ok) {
                document.getElementById('app-content').style.display = 'none';
                document.getElementById('success-screen').style.display = 'block';
                window.scrollTo(0,0);
            }
        }

        // Foro con Moderación y Likes
        function publishPost() {
            const text = document.getElementById('forum-text').value;
            const status = document.getElementById('ai-status');
            if(text.length < 4) return;

            status.innerText = "IA: MODERANDO...";
            status.style.color = "var(--p-blue)";

            setTimeout(() => {
                const toxic = ['mierda', 'puto', 'insulto', 'estafa']; // Simulación simple
                if(toxic.some(w => text.toLowerCase().includes(w))) {
                    status.innerText = "IA: BLOQUEADO POR SEGURIDAD";
                    status.style.color = "var(--p-pink)";
                    return;
                }

                const posts = JSON.parse(localStorage.getItem('di_posts') || '[]');
                posts.unshift({ id: Date.now(), user: "User_" + Math.floor(Math.random()*999), content: text, likes: 0 });
                localStorage.setItem('di_posts', JSON.stringify(posts));
                document.getElementById('forum-text').value = "";
                status.innerText = "IA: PUBLICADO";
                status.style.color = "#00ff88";
                renderPosts();
            }, 800);
        }

        function toggleLike(id) {
            const posts = JSON.parse(localStorage.getItem('di_posts') || '[]');
            const post = posts.find(p => p.id === id);
            if(post) {
                post.liked = !post.liked;
                post.likes += post.liked ? 1 : -1;
                localStorage.setItem('di_posts', JSON.stringify(posts));
                renderPosts();
            }
        }

        function renderPosts() {
            const feed = document.getElementById('forum-feed');
            const posts = JSON.parse(localStorage.getItem('di_posts') || '[]');
            feed.innerHTML = posts.map(p => `
                <div class="forum-post">
                    <div style="display:flex; justify-content:space-between; font-size:0.7rem; font-weight:900; margin-bottom:10px;">
                        <span><i class="fas fa-user-circle" style="color:var(--p-blue)"></i> ${p.user}</span>
                        <span style="color:var(--p-blue); opacity:0.6;">POST VERIFICADO</span>
                    </div>
                    <p style="font-size:0.9rem; line-height:1.6; opacity:0.9;">${p.content}</p>
                    <div class="post-footer">
                        <div class="like-btn ${p.liked ? 'active' : ''}" onclick="toggleLike(${p.id})">
                            <i class="${p.liked ? 'fas' : 'far'} fa-heart"></i> ${p.likes} Likes
                        </div>
                    </div>
                </div>
            `).join('');
        }

        renderPosts();
    </script>
</body>
</html>
