<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DI StudioX | Elite Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --p-blue: #00f2fe; --p-pink: #ff007f; --p-purple: #7000ff;
            --bg: #010409; --card: rgba(13, 17, 23, 0.95);
            --border: rgba(255, 255, 255, 0.1);
            --gradient: linear-gradient(135deg, var(--p-blue), var(--p-pink), var(--p-purple));
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; scroll-behavior: smooth; min-height: 100vh; display: flex; flex-direction: column; }

        /* LOGO VECTORIAL INDESTRUCTIBLE */
        .logo-box { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
        .logo-symbol { background: var(--gradient); padding: 5px 10px; border-radius: 8px; font-weight: 900; color: #000; font-size: 1.2rem; }
        .logo-text { font-weight: 900; font-size: 1.4rem; letter-spacing: -1px; }
        .logo-text span { color: var(--p-pink); font-style: italic; }

        /* SPLASH DE CARGA */
        #splash { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; justify-content: center; align-items: center; transition: 0.8s; }
        #splash.hidden { opacity: 0; visibility: hidden; transform: scale(1.1); pointer-events: none; }

        /* NAVEGACIÓN */
        nav { position: fixed; top: 0; width: 100%; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(20px); background: rgba(1, 4, 9, 0.8); border-bottom: 1px solid var(--border); z-index: 1000; }

        /* BOTÓN VOLVER (ESTRATÉGICO) */
        #back-btn { 
            position: fixed; bottom: 85px; right: 25px; width: 50px; height: 50px; 
            background: var(--card); border: 2px solid var(--p-blue); border-radius: 50%;
            display: flex; justify-content: center; align-items: center; color: var(--p-blue);
            cursor: pointer; z-index: 2000; transition: 0.4s; opacity: 0; pointer-events: none;
            box-shadow: 0 0 15px rgba(0,242,254,0.3);
        }
        #back-btn.visible { opacity: 1; pointer-events: auto; }
        #back-btn:hover { background: var(--p-blue); color: #000; box-shadow: 0 0 25px rgba(0,242,254,0.6); transform: scale(1.1); }

        main { padding: 110px 5% 40px; max-width: 800px; margin: 0 auto; flex: 1; width: 100%; }
        .text-gradient { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* TARJETAS Y FORMULARIO FULL */
        .card { background: var(--card); border-radius: 30px; padding: 35px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        label { color: var(--p-blue); font-size: 0.75rem; font-weight: 900; letter-spacing: 2px; display: block; margin: 25px 0 10px; text-transform: uppercase; }
        input[type="text"], input[type="email"], select, textarea { width: 100%; padding: 18px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; color: #fff; font-size: 1rem; outline: none; transition: 0.3s; }
        input:focus, textarea:focus, select:focus { border-color: var(--p-pink); background: rgba(255,255,255,0.06); }
        
        /* CAMPO DE ARCHIVOS MEJORADO */
        input[type="file"] { width: 100%; padding: 15px; background: rgba(0,242,254,0.05); border: 2px dashed var(--p-blue); border-radius: 12px; color: #fff; font-size: 0.9rem; cursor: pointer; }
        
        .btn-main { width: 100%; padding: 22px; background: var(--gradient); border: none; border-radius: 15px; font-weight: 900; color: #000; cursor: pointer; transition: 0.4s; margin-top: 30px; text-transform: uppercase; font-size: 1.05rem; letter-spacing: 1px; }
        .btn-main:hover { transform: translateY(-4px); box-shadow: 0 15px 30px rgba(255,0,127,0.4); }

        /* FORO & IA */
        .forum-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .forum-input-area { background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 30px; }
        .post-card { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; margin-bottom: 20px; border-left: 3px solid var(--p-blue); animation: fadeIn 0.5s ease; }
        .like-btn { cursor: pointer; color: #666; font-weight: 900; transition: 0.3s; display: flex; align-items: center; gap: 5px; }
        .like-btn.active { color: var(--p-pink); text-shadow: 0 0 10px var(--p-pink); }
        .like-btn i { font-size: 1.2rem; }

        /* FOOTER DE REDES (SIEMPRE VISIBLE) */
        footer { padding: 30px 0; border-top: 1px solid var(--border); background: rgba(0,0,0,0.6); text-align: center; margin-top: auto; }
        .footer-socials { display: flex; justify-content: center; gap: 30px; }
        .footer-socials a { font-size: 2rem; color: #fff; transition: 0.4s; opacity: 0.6; }
        .footer-socials a:hover { opacity: 1; transform: translateY(-5px) scale(1.1); color: var(--p-blue); }

        /* PANTALLA ÉXITO GIGANTE */
        #success-view { display: none; text-align: center; padding: 60px 0; animation: fadeIn 0.6s ease; }
        .giant-socials { display: flex; justify-content: center; gap: 35px; margin: 50px 0; flex-wrap: wrap; }
        .giant-socials a { font-size: 5rem; color: #fff; transition: 0.4s; animation: pulse 2s infinite; display: flex; align-items: center; justify-content: center; width: 100px; height: 100px; border-radius: 25px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); }
        
        @keyframes pulse { 0%, 100% { transform: scale(1); filter: drop-shadow(0 0 5px var(--p-blue)); } 50% { transform: scale(1.1); filter: drop-shadow(0 0 30px var(--p-blue)); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-box" style="transform: scale(1.5);">
            <div class="logo-symbol">DI</div><div class="logo-text">Studio<span>X</span></div>
        </div>
    </div>

    <div id="back-btn" onclick="window.scrollTo({top:0, behavior:'smooth'})"><i class="fas fa-arrow-up"></i></div>

    <nav>
        <div class="logo-box" onclick="location.reload()">
            <div class="logo-symbol">DI</div><div class="logo-text">Studio<span>X</span></div>
        </div>
        <div style="font-size: 0.65rem; font-weight: 900; color: var(--p-blue); border: 1px solid var(--p-blue); padding: 5px 10px; border-radius: 6px;">SISTEMA ACTIVO</div>
    </nav>

    <main id="main-content">
        <div id="form-view">
            <h1 style="text-align:center; font-size: 3rem; margin-bottom: 40px; line-height: 1.1;">Lanza tu<br><span class="text-gradient">Proyecto Élite</span></h1>
            
            <div class="card">
                <form id="proForm" action="https://formspree.io/f/mkoqopjp" method="POST" enctype="multipart/form-data">
                    <label><i class="fas fa-user"></i> Nombre / Empresa</label>
                    <input type="text" name="nombre" placeholder="Tu nombre completo" required>
                    
                    <label><i class="fas fa-envelope"></i> Email Principal</label>
                    <input type="email" name="email" placeholder="email@gmail.com" required>
                    
                    <label><i class="fas fa-layer-group"></i> Servicio Deseado</label>
                    <select name="servicio">
                        <option>Diseño de Logo Premium</option>
                        <option>Desarrollo Web Master</option>
                        <option>Portafolio de Negocios</option>
                        <option>Edición de Video Pro</option>
                    </select>
                    
                    <label><i class="fas fa-comment-dots"></i> Detalles de la Idea</label>
                    <textarea name="mensaje" rows="5" placeholder="Explica tu proyecto, colores, estilo..." required></textarea>
                    
                    <label><i class="fas fa-cloud-upload-alt"></i> Adjuntar Archivos (Fotos/PDFs)</label>
                    <input type="file" name="adjuntos" multiple>
                    
                    <button type="submit" class="btn-main" id="btn-submit">Enviar Proyecto</button>
                </form>
            </div>

            <section style="margin-top: 60px;">
                <div class="forum-header">
                    <h2 style="font-size: 2rem;">Foro <span class="text-gradient">Comunidad</span></h2>
                </div>
                
                <div class="forum-input-area">
                    <textarea id="forum-input" placeholder="Deja tu reseña o comentario..." style="width: 100%; background:transparent; border:none; color:#fff; font-size:1.1rem; outline:none; resize:none; min-height: 60px;"></textarea>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px; flex-wrap: wrap; gap: 10px;">
                        <span id="ai-status" style="font-size: 0.75rem; font-weight: 900; color: var(--p-blue); background: rgba(0,0,0,0.5); padding: 8px 12px; border-radius: 8px;"><i class="fas fa-robot"></i> IA: ESPERANDO</span>
                        <button class="btn-main" style="width:auto; margin:0; padding:12px 25px; font-size:0.85rem;" onclick="postToForum()">PUBLICAR AHORA</button>
                    </div>
                </div>
                
                <div id="forum-feed"></div>
            </section>
        </div>

        <div id="success-view">
            <i class="fas fa-check-circle" style="font-size: 5rem; color: #00ff88; margin-bottom: 20px; text-shadow: 0 0 30px #00ff88;"></i>
            <h1 class="text-gradient" style="font-size: 3.5rem;">¡PROYECTO RECIBIDO!</h1>
            <p style="margin-top: 15px; font-size: 1.2rem; opacity: 0.8;">Nuestra IA ha procesado los datos. Síguenos:</p>
            
            <div class="giant-socials">
                <a href="https://x.com/DIStudioOficial" target="_blank" style="color:#fff;"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="https://www.instagram.com/distudiooficialx" target="_blank" style="color:var(--p-pink)"><i class="fab fa-instagram"></i></a>
                <a href="https://www.facebook.com/profile.php?id=61583573461352" target="_blank" style="color:#1877f2"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.youtube.com/@DIStudioOficialX" target="_blank" style="color:#ff0000"><i class="fab fa-youtube"></i></a>
            </div>
            
            <button class="btn-main" style="max-width: 250px; margin: 0 auto; display: block;" onclick="location.reload()">VOLVER AL INICIO</button>
        </div>
    </main>

    <footer>
        <div class="footer-socials">
            <a href="https://x.com/DIStudioOficial" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="https://www.instagram.com/distudiooficialx" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.facebook.com/profile.php?id=61583573461352" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.youtube.com/@DIStudioOficialX" target="_blank"><i class="fab fa-youtube"></i></a>
        </div>
        <p style="font-size: 0.65rem; opacity: 0.4; margin-top: 20px; letter-spacing: 2px;">© 2026 DI STUDIOX INFINITY</p>
    </footer>

    <script>
        // 1. SPLASH SCREEN
        window.onload = () => {
            setTimeout(() => document.getElementById('splash').classList.add('hidden'), 1200);
            renderForum();
        }

        // 2. BOTÓN VOLVER ATRÁS
        window.onscroll = () => {
            const btn = document.getElementById('back-btn');
            btn.classList.toggle('visible', window.scrollY > 300);
        }

        // 3. ENVÍO DE FORMULARIO (FORMSPREE + ARCHIVOS)
        const form = document.getElementById('proForm');
        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ENVIANDO...';
            
            try {
                await fetch(form.action, { 
                    method: 'POST', 
                    body: new FormData(form), 
                    headers: {'Accept': 'application/json'} 
                });
            } finally {
                // Muestra la pantalla de éxito
                document.getElementById('form-view').style.display = 'none';
                document.getElementById('success-view').style.display = 'block';
                window.scrollTo(0,0);
            }
        }

        // 4. FORO Y MODERACIÓN CON IA (RESTAURADA Y MEJORADA)
        function postToForum() {
            const input = document.getElementById('forum-input');
            const statusLabel = document.getElementById('ai-status');
            const text = input.value.trim();

            if(text.length < 4) {
                statusLabel.innerHTML = '<i class="fas fa-exclamation-triangle"></i> TEXTO MUY CORTO';
                statusLabel.style.color = "var(--p-pink)";
                return;
            }

            // Animación de IA analizando
            statusLabel.innerHTML = '<i class="fas fa-cog fa-spin"></i> IA: ANALIZANDO...';
            statusLabel.style.color = "var(--p-blue)";

            setTimeout(() => {
                // Filtro de toxicidad
                const toxicWords = ['mierda', 'puto', 'puta', 'estafa', 'tonto', 'basura', 'idiota'];
                if(toxicWords.some(w => text.toLowerCase().includes(w))) {
                    statusLabel.innerHTML = '<i class="fas fa-shield-alt"></i> IA: BLOQUEADO POR SEGURIDAD';
                    statusLabel.style.color = "var(--p-pink)";
                    return;
                }

                // Guardar y publicar
                const posts = JSON.parse(localStorage.getItem('di_posts') || '[]');
                posts.unshift({ 
                    id: Date.now(), 
                    user: "Cliente_" + Math.floor(Math.random()*9000 + 1000), 
                    text: text, 
                    likes: 0, 
                    liked: false 
                });
                localStorage.setItem('di_posts', JSON.stringify(posts));
                
                input.value = "";
                statusLabel.innerHTML = '<i class="fas fa-check-circle"></i> IA: APROBADO';
                statusLabel.style.color = "#00ff88";
                renderForum();
            }, 1000); // 1 segundo de simulación de IA
        }

        // 5. SISTEMA DE LIKES
        function toggleLike(id) {
            let posts = JSON.parse(localStorage.getItem('di_posts') || '[]');
            const p = posts.find(x => x.id === id);
            if(p) { 
                p.liked = !p.liked; 
                p.likes += p.liked ? 1 : -1; 
                localStorage.setItem('di_posts', JSON.stringify(posts)); 
                renderForum(); 
            }
        }

        // 6. RENDERIZAR EL FORO
        function renderForum() {
            const feed = document.getElementById('forum-feed');
            let posts = JSON.parse(localStorage.getItem('di_posts') || '[]');
            
            // Post por defecto si está vacío
            if(posts.length === 0) {
                posts = [{id:1, user:"Admin_StudioX", text:"¡Bienvenidos al foro oficial! Dejad vuestras opiniones y proyectos aquí.", likes:15, liked:false}];
            }

            feed.innerHTML = posts.map(p => `
                <div class="post-card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:12px; font-size:0.8rem; color:var(--p-blue); font-weight:900;">
                        <span><i class="fas fa-user-astronaut"></i> @${p.user}</span> 
                        <span style="color:#00ff88; border: 1px solid #00ff88; padding: 2px 6px; border-radius: 4px; font-size:0.6rem;">VERIFICADO</span>
                    </div>
                    <p style="font-size:1.05rem; line-height: 1.5; opacity: 0.9;">${p.text}</p>
                    <div style="margin-top:15px; display:flex; justify-content:flex-end;">
                        <span class="like-btn ${p.liked ? 'active' : ''}" onclick="toggleLike(${p.id})">
                            <i class="${p.liked ? 'fas' : 'far'} fa-heart"></i> ${p.likes}
                        </span>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
