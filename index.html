<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIStudioX | Elite Global</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'es',
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <style>
        :root {
            --p-blue: #00f2fe; --p-pink: #ff007f; --p-purple: #7000ff;
            --bg: #010409; --card: rgba(13, 17, 23, 0.95);
            --text: #ffffff; --border: rgba(255, 255, 255, 0.1);
            --gradient: linear-gradient(135deg, var(--p-blue), var(--p-pink), var(--p-purple));
        }
        [data-theme="light"] {
            --bg: #f0f2f5; --card: #ffffff; --text: #1a1a1a;
            --border: rgba(0, 0, 0, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.4s; }
        
        #splash { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; justify-content: center; align-items: center; transition: 0.8s; }
        #splash.hidden { opacity: 0; visibility: hidden; }

        .logo-box { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .logo-symbol { background: var(--gradient); padding: 5px 12px; border-radius: 10px; font-weight: 900; color: #000; }
        .logo-text { font-weight: 900; font-size: 1.5rem; color: var(--text); }

        nav { position: fixed; top: 0; width: 100%; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(20px); background: rgba(var(--bg), 0.8); border-bottom: 1px solid var(--border); z-index: 1000; }
        
        #google_translate_element { display: none; }
        .goog-te-banner-frame { display: none !important; }
        body { top: 0px !important; }

        main { padding: 120px 5% 40px; max-width: 800px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 30px; padding: 35px; border: 1px solid var(--border); margin-bottom: 30px; }
        
        label { color: var(--p-blue); font-size: 0.8rem; font-weight: 900; display: block; margin: 20px 0 8px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 16px; background: rgba(128,128,128,0.1); border: 1px solid var(--border); border-radius: 14px; color: var(--text); font-size: 1rem; outline: none; }
        
        .btn-main { width: 100%; padding: 20px; background: var(--gradient); border: none; border-radius: 18px; font-weight: 900; color: #000; cursor: pointer; text-transform: uppercase; margin-top: 25px; }

        #settings-panel { position: fixed; top: 80px; right: 5%; background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid var(--border); display: none; z-index: 2000; width: 280px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        #settings-panel.active { display: block; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <div id="splash">
        <div class="logo-box" style="transform: scale(1.8);">
            <div class="logo-symbol">DI</div><div class="logo-text">Studio<span>X</span></div>
        </div>
    </div>

    <nav>
        <div class="logo-box" onclick="location.reload()">
            <div class="logo-symbol">DI</div><div class="logo-text">Studio<span>X</span></div>
        </div>
        <i class="fas fa-cog" style="cursor:pointer; color:var(--p-blue); font-size: 1.5rem;" onclick="document.getElementById('settings-panel').classList.toggle('active')"></i>
    </nav>

    <div id="settings-panel">
        <label>Idioma / Language</label>
        <select id="lang-select" onchange="runTranslation(this.value)">
            </select>
        
        <label>Apariencia</label>
        <button onclick="toggleTheme()" class="btn-main" style="padding:10px; font-size:0.8rem; background:var(--border); color:var(--text);">Modo Claro/Oscuro</button>
    </div>

    <main>
        <h1 style="text-align:center; font-size: 3.5rem; font-weight:900; margin-bottom: 40px;">DIStudioX</h1>

        <div class="card">
            <form action="https://formspree.io/f/mkoqopjp" method="POST" enctype="multipart/form-data">
                <label>Nombre Completo</label>
                <input type="text" name="nombre" required>

                <label>Email (Gmail recomendado)</label>
                <input type="email" name="email" placeholder="ejemplo@gmail.com" required>

                <label>Selecciona tu Servicio</label>
                <select name="servicio">
                    <option>Diseño Logo Premium</option>
                    <option>Creación de Portafolio Pro</option>
                    <option>Desarrollo Web Master</option>
                    <option>Traducción Profesional</option>
                    <option>Edición de Video</option>
                </select>

                <label>Descripción del Proyecto</label>
                <textarea name="mensaje" rows="4" required></textarea>

                <label>Adjuntar Archivos</label>
                <input type="file" name="archivo" multiple>

                <button type="submit" class="btn-main">Lanzar Proyecto</button>
            </form>
        </div>

        <section id="foro">
            <h2 style="margin-bottom:20px;">Comunidad Live</h2>
            <div class="card" style="padding:20px;">
                <textarea id="forum-input" placeholder="¿Qué tienes en mente?"></textarea>
                <button class="btn-main" style="width:auto; padding:10px 25px;" onclick="addPost()">Enviar</button>
            </div>
            <div id="forum-feed"></div>
        </section>
    </main>

    <script>
        const langMap = {"Español":"es", "Inglés":"en", "Francés":"fr", "Alemán":"de", "Italiano":"it", "Portugués":"pt", "Ruso":"ru", "Chino":"zh-CN", "Japonés":"ja"};

        window.onload = () => {
            const sel = document.getElementById('lang-select');
            Object.keys(langMap).forEach(l => {
                let opt = document.createElement('option');
                opt.value = langMap[l]; opt.innerText = l;
                sel.appendChild(opt);
            });
            setTimeout(() => document.getElementById('splash').classList.add('hidden'), 1200);
        };

        function runTranslation(code) {
            const gCombo = document.querySelector('.goog-te-combo');
            if(gCombo) {
                gCombo.value = code;
                gCombo.dispatchEvent(new Event('change'));
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        function addPost() {
            const text = document.getElementById('forum-input').value;
            if(!text) return;
            const feed = document.getElementById('forum-feed');
            const div = document.createElement('div');
            div.className = 'card';
            div.style.padding = '15px';
            div.style.marginTop = '10px';
            div.innerHTML = `<p>${text}</p>`;
            feed.prepend(div);
            document.getElementById('forum-input').value = "";
        }
    </script>
</body>
</html>
