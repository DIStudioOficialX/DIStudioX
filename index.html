<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIStudioX | Elite Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --p-blue: #00f2fe; --p-pink: #ff007f; --p-purple: #7000ff;
            --bg: #010409; --card: rgba(13, 17, 23, 0.95);
            --text: #ffffff; --border: rgba(255, 255, 255, 0.1);
            --gradient: linear-gradient(135deg, var(--p-blue), var(--p-pink), var(--p-purple));
        }

        [data-theme="light"] {
            --bg: #f0f2f5; --card: #ffffff; --text: #1a1a1a;
            --border: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; transition: background 0.4s, color 0.4s; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; scroll-behavior: smooth; min-height: 100vh; display: flex; flex-direction: column; }

        /* PANTALLA DE CARGA TOTAL */
        #splash { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; justify-content: center; align-items: center; transition: 0.8s; }
        #splash.hidden { opacity: 0; visibility: hidden; transform: scale(1.1); pointer-events: none; }

        /* LOGO VECTORIAL */
        .logo-box { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
        .logo-symbol { background: var(--gradient); padding: 5px 12px; border-radius: 10px; font-weight: 900; color: #000; font-size: 1.2rem; }
        .logo-text { font-weight: 900; font-size: 1.5rem; color: var(--text); letter-spacing: -1px; }
        .logo-text span { color: var(--p-pink); }

        /* NAVEGACIÓN */
        nav { position: fixed; top: 0; width: 100%; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(20px); background: rgba(var(--bg), 0.8); border-bottom: 1px solid var(--border); z-index: 1000; }
        .settings-btn { cursor: pointer; font-size: 1.4rem; color: var(--p-blue); transition: 0.3s; }
        .settings-btn:hover { transform: rotate(90deg); color: var(--p-pink); }

        /* PANEL AJUSTES */
        #settings-panel { position: fixed; top: 80px; right: 5%; background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid var(--border); display: none; z-index: 2000; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 300px; animation: fadeIn 0.3s ease; }
        #settings-panel.active { display: block; }

        main { padding: 120px 5% 40px; max-width: 800px; margin: 0 auto; width: 100%; flex: 1; }
        .card { background: var(--card); border-radius: 30px; padding: 35px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.2); margin-bottom: 30px; }
        
        label { color: var(--p-blue); font-size: 0.8rem; font-weight: 900; display: block; margin: 25px 0 10px; text-transform: uppercase; letter-spacing: 1.5px; }
        input, select, textarea { width: 100%; padding: 18px; background: rgba(128,128,128,0.1); border: 1px solid var(--border); border-radius: 15px; color: var(--text); outline: none; font-size: 1rem; }
        
        .btn-main { width: 100%; padding: 22px; background: var(--gradient); border: none; border-radius: 18px; font-weight: 900; color: #000; cursor: pointer; text-transform: uppercase; margin-top: 30px; letter-spacing: 1px; transition: 0.3s; }
        .btn-main:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* FORO */
        .post-card { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; margin-bottom: 15px; border-left: 4px solid var(--p-blue); }
        .post-user { font-weight: 900; font-size: 0.75rem; color: var(--p-blue); margin-bottom: 8px; display: block; }
        .like-btn { cursor: pointer; display: flex; align-items: center; gap: 8px; justify-content: flex-end; margin-top: 15px; font-weight: 900; color: #666; transition: 0.3s; }
        .like-btn.active { color: var(--p-pink); }

        /* FOOTER */
        footer { padding: 50px 0; text-align: center; border-top: 1px solid var(--border); margin-top: 50px; }
        .footer-socials { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; }
        .footer-socials a { font-size: 2rem; color: var(--text); opacity: 0.6; transition: 0.4s; }
        .footer-socials a:hover { opacity: 1; transform: translateY(-5px); color: var(--p-blue); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-box" style="transform: scale(1.8);">
            <div class="logo-symbol">DI</div><div class="logo-text">Studio<span>X</span></div>
        </div>
    </div>

    <nav>
        <div class="logo-box" onclick="location.reload()">
            <div class="logo-symbol">DI</div><div class="logo-text">Studio<span>X</span></div>
        </div>
        <i class="fas fa-cog settings-btn" onclick="toggleSettings()"></i>
    </nav>

    <div id="settings-panel">
        <h3 id="t-settings-title" style="margin-bottom: 20px;">Settings</h3>
        <label id="t-label-lang">System Language</label>
        <select id="language-select" onchange="changeLanguage(this.value)"></select>
        
        <label id="t-label-theme">Appearance</label>
        <button onclick="toggleTheme()" class="btn-main" style="padding: 12px; font-size: 0.8rem; background: var(--border); color: var(--text); margin-top: 5px;">
            <i class="fas fa-adjust"></i> <span id="t-theme-btn">Dark/Light Mode</span>
        </button>
    </div>

    <main>
        <h1 style="text-align:center; font-size: 3.5rem; font-weight:900; margin-bottom: 10px;">DIStudioX</h1>
        <p style="text-align:center; opacity: 0.5; margin-bottom: 40px; letter-spacing: 2px;">ELITE ENGINE © 2026</p>

        <div class="card">
            <form id="proForm" action="https://formspree.io/f/mkoqopjp" method="POST" enctype="multipart/form-data">
                <label id="t-label-name">Full Name / Company</label>
                <input type="text" name="nombre" required>

                <label id="t-label-service">Pro Service</label>
                <select name="servicio" id="service-select">
                    <option value="logo" data-key="opt-logo">Premium Logo Design</option>
                    <option value="web" data-key="opt-web">Master Web Dev</option>
                    <option value="trans" data-key="opt-trans">Professional Translation</option>
                    <option value="video" data-key="opt-video">Video Editing Pro</option>
                </select>

                <label id="t-label-details">Project Details</label>
                <textarea name="mensaje" rows="4" required></textarea>

                <label id="t-label-file">Attach Assets (Images/PDF)</label>
                <input type="file" name="archivo" multiple>

                <button type="submit" class="btn-main" id="t-btn-send">Launch Project</button>
            </form>
        </div>

        <section style="margin-top: 60px;">
            <h2 style="margin-bottom: 25px; font-size: 2rem;"><span id="t-forum-title">Community Feed</span> <span style="color:var(--p-pink)">X</span></h2>
            <div class="card" style="padding: 25px;">
                <textarea id="forum-input" style="background:transparent; border:none; resize:none; font-size: 1.1rem;" placeholder="Share your experience..."></textarea>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px;">
                    <span id="ai-status" style="font-size:0.7rem; font-weight:900; color:var(--p-blue); background:rgba(0,0,0,0.3); padding:5px 10px; border-radius:5px;">IA: STANDBY</span>
                    <button class="btn-main" style="width:auto; margin:0; padding:12px 30px; font-size:0.85rem;" onclick="postToForum()" id="t-btn-post">Post</button>
                </div>
            </div>
            <div id="forum-feed"></div>
        </section>
    </main>

    <footer>
        <div class="footer-socials">
            <a href="https://x.com/DIStudioOficial" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="https://www.instagram.com/distudiooficialx" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.facebook.com/profile.php?id=61583573461352" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.youtube.com/@DIStudioOficialX" target="_blank"><i class="fab fa-youtube"></i></a>
        </div>
        <p style="font-size: 0.75rem; opacity: 0.4; font-weight: 600;">© 2026 DIStudioX INFINITY | ALL RIGHTS RESERVED</p>
    </footer>

    <script>
        const translations = {
            "Español": {
                "settings-title": "Ajustes", "label-lang": "Idioma del Sistema", "theme-btn": "Cambiar Modo",
                "label-name": "Nombre Completo", "label-service": "Servicio Pro", "label-details": "Detalles del Proyecto",
                "label-file": "Adjuntar Archivos", "btn-send": "Lanzar Proyecto", "opt-logo": "Diseño Logo Premium",
                "opt-web": "Desarrollo Web Master", "opt-trans": "Traducción Profesional", "opt-video": "Edición de Video Pro",
                "forum-title": "Foro Comunidad", "btn-post": "Publicar", "placeholder": "Comparte tu experiencia..."
            },
            "Inglés": {
                "settings-title": "Settings", "label-lang": "System Language", "theme-btn": "Switch Mode",
                "label-name": "Full Name", "label-service": "Pro Service", "label-details": "Project Details",
                "label-file": "Attach Assets", "btn-send": "Launch Project", "opt-logo": "Premium Logo Design",
                "opt-web": "Master Web Dev", "opt-trans": "Professional Translation", "opt-video": "Video Editing Pro",
                "forum-title": "Community Feed", "btn-post": "Post", "placeholder": "Share your experience..."
            },
            "Francés": {
                "settings-title": "Paramètres", "label-lang": "Langue du Système", "theme-btn": "Changer le Mode",
                "label-name": "Nom Complet", "label-service": "Service Pro", "label-details": "Détails du Projet",
                "label-file": "Joindre des Fichiers", "btn-send": "Lancer le Projet", "opt-logo": "Design de Logo Premium",
                "opt-web": "Développement Web", "opt-trans": "Traduction Pro", "opt-video": "Montage Vidéo",
                "forum-title": "Flux Communautaire", "btn-post": "Publier", "placeholder": "Partagez votre expérience..."
            }
        };

        const languages = ["Alemán", "Árabe", "Chino", "Coreano", "Español", "Francés", "Hindi", "Inglés", "Italiano", "Japonés", "Portugués", "Ruso", "Turco"];

        window.onload = () => {
            const select = document.getElementById('language-select');
            languages.sort().forEach(lang => {
                const opt = document.createElement('option');
                opt.value = lang; opt.innerText = lang;
                if(lang === "Español") opt.selected = true;
                select.appendChild(opt);
            });
            changeLanguage("Español"); // Cargar español por defecto
            renderForum();
            setTimeout(() => document.getElementById('splash').classList.add('hidden'), 1200);
        };

        function toggleSettings() { document.getElementById('settings-panel').classList.toggle('active'); }
        function toggleTheme() {
            const html = document.documentElement;
            html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        function changeLanguage(lang) {
            const dict = translations[lang] || translations["Inglés"];
            document.getElementById('t-settings-title').innerText = dict["settings-title"];
            document.getElementById('t-label-lang').innerText = dict["label-lang"];
            document.getElementById('t-theme-btn').innerText = dict["theme-btn"];
            document.getElementById('t-label-name').innerText = dict["label-name"];
            document.getElementById('t-label-service').innerText = dict["label-service"];
            document.getElementById('t-label-details').innerText = dict["label-details"];
            document.getElementById('t-label-file').innerText = dict["label-file"];
            document.getElementById('t-btn-send').innerText = dict["btn-send"];
            document.getElementById('t-forum-title').innerText = dict["forum-title"];
            document.getElementById('t-btn-post').innerText = dict["btn-post"];
            document.getElementById('forum-input').placeholder = dict["placeholder"];
            
            document.querySelectorAll('#service-select option').forEach(opt => {
                opt.innerText = dict[opt.getAttribute('data-key')];
            });
        }

        // SISTEMA DE FORO INTEGRAL
        function postToForum() {
            const input = document.getElementById('forum-input');
            const status = document.getElementById('ai-status');
            if(input.value.trim().length < 5) return;

            status.innerHTML = '<i class="fas fa-spinner fa-spin"></i> IA ANALYZING...';
            setTimeout(() => {
                const posts = JSON.parse(localStorage.getItem('di_posts') || '[]');
                posts.unshift({ id: Date.now(), user: "Client_X" + Math.floor(Math.random()*999), text: input.value, likes: 0, liked: false });
                localStorage.setItem('di_posts', JSON.stringify(posts));
                input.value = "";
                status.innerText = "IA: APPROVED ✓";
                status.style.color = "#00ff88";
                renderForum();
                setTimeout(() => { status.innerText = "IA: STANDBY"; status.style.color = "var(--p-blue)"; }, 2000);
            }, 1000);
        }

        function toggleLike(id) {
            let posts = JSON.parse(localStorage.getItem('di_posts') || '[]');
            const p = posts.find(x => x.id === id);
            if(p) {
                p.liked = !p.liked;
                p.likes += p.liked ? 1 : -1;
                localStorage.setItem('di_posts', JSON.stringify(posts));
                renderForum();
            }
        }

        function renderForum() {
            const feed = document.getElementById('forum-feed');
            let posts = JSON.parse(localStorage.getItem('di_posts') || '[]');
            if(posts.length === 0) posts = [{id:1, user:"System_Admin", text:"Welcome to DIStudioX. Start your project today!", likes:24, liked:false}];
            
            feed.innerHTML = posts.map(p => `
                <div class="post-card">
                    <span class="post-user">@${p.user}</span>
                    <p style="line-height:1.6;">${p.text}</p>
                    <div class="like-btn ${p.liked ? 'active' : ''}" onclick="toggleLike(${p.id})">
                        <i class="${p.liked ? 'fas' : 'far'} fa-heart"></i> ${p.likes}
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
